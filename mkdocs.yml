site_name: projinit - Documentation Technique
site_description: Documentation technique du projet projinit v2.0
site_author: Xavier Gueret
repo_url: https://github.com/TiPunchLabs/projinit
repo_name: TiPunchLabs/projinit

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Accueil: index.md
  - Architecture: architecture.md
  - Standards YAML: standards.md
  - Templates Jinja2: templates.md
  - Detection: detection.md
  - Commandes CLI: cli.md
  - Configuration: configuration.md
  - Modeles: models.md
  - Flux d'execution: flow.md
  - Extension du projet: extending.md
  - API Reference:
      - Detector: api/detector.md
      - Checker: api/checker.md
      - Reporter: api/reporter.md
  - Internals:
      - Algorithme de detection: internals/detection-algorithm.md
  - Decisions (ADR):
      - Vue d'ensemble: adr/index.md
      - ADR-001 argparse vs click: adr/0001-argparse-vs-click.md
      - ADR-002 src/ layout: adr/0002-src-layout.md
      - ADR-003 Standards YAML: adr/0003-yaml-standards.md
      - ADR-004 Scoring detection: adr/0004-scoring-detection.md
      - ADR-005 Templates Jinja2: adr/0005-jinja2-templates.md
      - ADR-006 rich terminal: adr/0006-rich-terminal.md
      - ADR-007 Hierarchie config: adr/0007-config-hierarchy.md
      - ADR-008 direnv + pass: adr/0008-direnv-pass-secrets.md
      - ADR-009 Niveaux de checks: adr/0009-check-levels.md
      - ADR-010 CLI only: adr/0010-cli-only.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: fr
